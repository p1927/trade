# Hub SearXNG — keep_only merges with upstream defaults; override only what we need.
#
# Bing news scraper (bing_news.py → /news/infinitescrollajax) intermittently gets empty HTML
# from Bing bot-detection ("Document is empty"). The bing web engine on categories=news works
# reliably for the same headlines — use that for hub ingest instead.
#
# DuckDuckGo / mojeek / qwant: disabled while container IP is CAPTCHA- or 403-blocked.
# Re-enable after solving CAPTCHA from the container network —
# see https://docs.searxng.org/admin/answer-captcha.html
use_default_settings:
  engines:
    keep_only:
      - bing

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "tradingagents-local-searxng"
  limiter: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en-IN"
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 20.0
  enable_http2: false

categories_as_tabs:
  general: General
  finance: Finance
  news: News

engines:
  - name: bing
    disabled: false
    categories:
      - general
      - finance
      - news
    timeout: 10.0
    enable_http2: false
