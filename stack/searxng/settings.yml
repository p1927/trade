use_default_settings:
  engines:
    keep_only:
      - bing
      - bing news
      - mojeek
      - qwant

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "tradingagents-local-searxng"
  limiter: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0

categories_as_tabs:
  general: General
  finance: Finance
  news: News

engines:
  - name: bing
    engine: bing
    categories:
      - general
      - finance

  - name: bing news
    categories:
      - news

  - name: mojeek
    engine: mojeek
    categories:
      - general
      - finance

  - name: qwant
    engine: qwant
    categories:
      - general
      - finance
