# TimescaleDB hot-tier tuning (mounted read-only; applied via entrypoint -c flags).
# Override via TIMESCALE_SHARED_BUFFERS / TIMESCALE_MAX_WAL_SIZE in docker-compose env.
#
# Hot tick tier keeps ~7 days of sub-minute quotes — modest RAM, named Docker volume
# (not bind mounts) for I/O. Increase shared_buffers on hosts with ≥16 GB RAM.

shared_buffers = 256MB
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
effective_cache_size = 1GB
maintenance_work_mem = 128MB
work_mem = 16MB

# Surface recovery/checkpoint progress in docker logs (WAL replay after unclean stop).
log_checkpoints = on
log_connections = off
log_disconnections = off
