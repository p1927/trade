# Skyvern agentic browser sidecar for Trade stack.
# Start: scripts/start_skyvern.sh
# UI: http://localhost:8080  API: http://localhost:8010 (8010 avoids ed-alpha on 8000)
# LLM: MiniMax from repo .env via scripts/sync_skyvern_env.sh
# Local API auth: auto-generated in .skyvern-data/.skyvern/credentials.toml (no manual copy)

services:
  skyvern-postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    volumes:
      - ./.skyvern-data/postgres:/var/lib/postgresql/data
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: skyvern
      POSTGRES_PASSWORD: skyvern
      POSTGRES_DB: skyvern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyvern"]
      interval: 5s
      timeout: 5s
      retries: 5

  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.skyvern
    ports:
      - "${SKYVERN_HOST_PORT:-8010}:8000"
      - "${SKYVERN_BROWSER_PORT:-6080}:6080"
    volumes:
      - ./.skyvern-data/artifacts:/data/artifacts
      - ./.skyvern-data/videos:/data/videos
      - ./.skyvern-data/har:/data/har
      - ./.skyvern-data/log:/data/log
      - ./.skyvern-data/downloads:/data/downloads
      - ./.skyvern-data/browser_sessions:/data/browser_sessions
      - ./.skyvern-data/credential_vault:/data/credential_vault
      - ./.skyvern-data/.skyvern:/app/.skyvern
      - ./.skyvern-data/host-ca-bundle.pem:/etc/ssl/host-ca-bundle.pem:ro
    environment:
      DATABASE_STRING: postgresql+psycopg://skyvern:skyvern@skyvern-postgres:5432/skyvern
      SSL_CERT_FILE: /etc/ssl/host-ca-bundle.pem
      REQUESTS_CA_BUNDLE: /etc/ssl/host-ca-bundle.pem
      CURL_CA_BUNDLE: /etc/ssl/host-ca-bundle.pem
      # UI on :8080 calls API on :8010 — wildcard CORS is ignored for credentialed requests
      ALLOWED_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
      ALLOWED_ORIGIN_REGEX: '^https?://(localhost|127\.0\.0\.1)(:\d+)?$'
      BROWSER_STREAMING_MODE: ${BROWSER_STREAMING_MODE:-cdp}
      BROWSER_TYPE: ${BROWSER_TYPE:-chromium-headful}
      DOWNLOAD_PATH: /data/downloads
      BROWSER_SESSION_BASE_PATH: /data/browser_sessions
      CREDENTIAL_VAULT_TYPE: ${CREDENTIAL_VAULT_TYPE:-skyvern}
      ENABLE_LOCAL_CREDENTIAL_VAULT: "true"
      LOCAL_CREDENTIAL_VAULT_PATH: /data/credential_vault
      ENABLE_CODE_BLOCK: "true"
    depends_on:
      skyvern-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 180s

  skyvern-ui:
    image: public.ecr.aws/skyvern/skyvern-ui:latest
    restart: on-failure
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./.skyvern-data/artifacts:/data/artifacts
      - ./.skyvern-data/videos:/data/videos
      - ./.skyvern-data/har:/data/har
      - ./.skyvern-data/.skyvern:/app/.skyvern
    env_file:
      - .env.skyvern
    environment:
      # Browser hits host-mapped API port (8010 when ed-alpha uses 8000)
      VITE_API_BASE_URL: http://localhost:${SKYVERN_HOST_PORT:-8010}/api/v1
      VITE_WSS_BASE_URL: ws://localhost:${SKYVERN_HOST_PORT:-8010}/api/v1
      VITE_ARTIFACT_API_BASE_URL: http://localhost:9090
      VITE_BROWSER_STREAMING_MODE: ${VITE_BROWSER_STREAMING_MODE:-cdp}
      VITE_ENABLE_CODE_BLOCK: "true"
    depends_on:
      skyvern:
        condition: service_healthy
