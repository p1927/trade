# Hub Docker services — host ports come from stack/ports.yaml (sync: python scripts/sync_stack_ports.py --apply)
services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: tradingagents-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST_PORT}:${SEARXNG_CONTAINER_PORT}"
    volumes:
      - ./stack/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trade-hub-timescaledb
    restart: unless-stopped
    init: true
    # Allow checkpoint flush on graceful stop; avoid docker kill during WAL replay.
    stop_grace_period: 120s
    shm_size: 256mb
    ports:
      - "${TIMESCALE_HOST_PORT}:${TIMESCALE_CONTAINER_PORT}"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tradehub
      POSTGRES_DB: trade_hub
      # Optional overrides (defaults in stack/timescaledb/postgresql.custom.conf)
      TIMESCALE_SHARED_BUFFERS: ${TIMESCALE_SHARED_BUFFERS:-}
      TIMESCALE_MAX_WAL_SIZE: ${TIMESCALE_MAX_WAL_SIZE:-}
    volumes:
      # Named volume (not bind mount) — avoids Docker Desktop bind-mount I/O thrash.
      - trade_hub_timescale_data:/var/lib/postgresql/data
      - ./stack/timescaledb/entrypoint-wrapper.sh:/stack/timescaledb/entrypoint-wrapper.sh:ro
      - ./stack/timescaledb/postgresql.custom.conf:/stack/timescaledb/postgresql.custom.conf:ro
    entrypoint: ["/bin/bash", "/stack/timescaledb/entrypoint-wrapper.sh"]
    command: ["postgres"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trade_hub"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: trade-hub-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_CONTAINER_PORT}"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - trade_hub_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  trade_hub_timescale_data:
    name: trade_hub_timescale_data
  trade_hub_redis_data:
    name: trade_hub_redis_data
