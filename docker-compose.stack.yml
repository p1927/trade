services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: tradingagents-searxng
    restart: unless-stopped
    ports:
      - "5555:8080"
    volumes:
      - ./stack/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:5555/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trade-hub-timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tradehub
      POSTGRES_DB: trade_hub
    volumes:
      - trade_hub_timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trade_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  trade_hub_timescale_data:
